<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Subnet IPv4 avec WireGuard et VyOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e13"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a371f7"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1010" cy="150" r="360" fill="url(#glow)"/>
  <rect x="0" y="0" width="8" height="630" fill="url(#title)"/>

  <text x="80" y="200" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="26" letter-spacing="5" fill="#a371f7">TUTORIEL · RÉSEAU</text>

  <text x="78" y="296" font-family="'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="86" font-weight="800" letter-spacing="-3" fill="url(#title)">Subnet IPv4</text>
  <text x="78" y="378" font-family="'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="70" font-weight="800" letter-spacing="-2.5" fill="#f0f6fc">WireGuard + VyOS</text>

  <text x="80" y="446" font-family="'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="30" fill="#8b949e">Router un /29 public chez soi · Proxmox</text>

  <circle cx="88" cy="556" r="7" fill="#a371f7"/>
  <text x="106" y="564" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="24" fill="#c9d1d9">blog de kofy</text>

  <!-- icon: router branching to a subnet of nodes -->
  <g transform="translate(975,315) scale(0.86)" stroke-linecap="round">
    <!-- branches -->
    <g stroke="#a371f7" stroke-width="4" fill="none" opacity="0.85">
      <path d="M0 50 C0 110 -130 90 -130 130"/>
      <path d="M0 50 V130"/>
      <path d="M0 50 C0 110 130 90 130 130"/>
    </g>
    <!-- router -->
    <rect x="-95" y="-30" width="190" height="80" rx="16" fill="#161b22" stroke="#a371f7" stroke-width="4"/>
    <g stroke="#58a6ff" stroke-width="4" stroke-linecap="round">
      <line x1="-60" y1="10" x2="60" y2="10"/>
      <line x1="-60" y1="-8" x2="40" y2="-8"/>
    </g>
    <path d="M64 -14 l16 6 l-16 6 z" fill="#56d364"/>
    <!-- subnet nodes -->
    <g fill="#0d1117" stroke="#58a6ff" stroke-width="4">
      <circle cx="-130" cy="150" r="22"/>
      <circle cx="0" cy="150" r="22"/>
      <circle cx="130" cy="150" r="22"/>
    </g>
    <g fill="#58a6ff" font-family="'JetBrains Mono',monospace" font-size="15" text-anchor="middle">
      <text x="-130" y="156">.1</text>
      <text x="0" y="156">.2</text>
      <text x="130" y="156">.3</text>
    </g>
  </g>
</svg>
