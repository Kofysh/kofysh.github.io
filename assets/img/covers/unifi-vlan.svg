<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Réseau VLAN avec UniFi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e13"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#56d364"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1010" cy="150" r="360" fill="url(#glow)"/>
  <rect x="0" y="0" width="8" height="630" fill="url(#title)"/>

  <!-- eyebrow -->
  <text x="80" y="200" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="26" letter-spacing="5" fill="#56d364">TUTORIEL · RÉSEAU</text>

  <!-- title -->
  <text x="78" y="300" font-family="'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="92" font-weight="800" letter-spacing="-3" fill="url(#title)">Réseau VLAN</text>
  <text x="78" y="392" font-family="'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="92" font-weight="800" letter-spacing="-3" fill="#f0f6fc">avec UniFi</text>

  <!-- subtitle -->
  <text x="80" y="452" font-family="'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="30" fill="#8b949e">Gateway · Switch · Wi-Fi · Firewall · VPN</text>

  <!-- wordmark -->
  <circle cx="88" cy="556" r="7" fill="#56d364"/>
  <text x="106" y="564" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace" font-size="24" fill="#c9d1d9">blog de kofy</text>

  <!-- icon: switch + nodes -->
  <g transform="translate(905,300)" stroke-linecap="round">
    <g stroke="#58a6ff" stroke-width="4" fill="none" opacity="0.9">
      <line x1="-120" y1="-120" x2="-120" y2="-40"/>
      <line x1="0" y1="-150" x2="0" y2="-40"/>
      <line x1="120" y1="-120" x2="120" y2="-40"/>
    </g>
    <g fill="#0d1117" stroke="#58a6ff" stroke-width="4">
      <circle cx="-120" cy="-140" r="18"/>
      <circle cx="0" cy="-170" r="18"/>
      <circle cx="120" cy="-140" r="18"/>
    </g>
    <!-- switch body -->
    <rect x="-160" y="-40" width="320" height="90" rx="16" fill="#161b22" stroke="#2a313c" stroke-width="3"/>
    <circle cx="-130" cy="5" r="6" fill="#56d364"/>
    <g fill="#58a6ff">
      <rect x="-80" y="20" width="22" height="14" rx="3"/>
      <rect x="-48" y="20" width="22" height="14" rx="3"/>
      <rect x="-16" y="20" width="22" height="14" rx="3"/>
      <rect x="16" y="20" width="22" height="14" rx="3"/>
      <rect x="48" y="20" width="22" height="14" rx="3"/>
      <rect x="80" y="20" width="22" height="14" rx="3"/>
      <rect x="112" y="20" width="22" height="14" rx="3"/>
    </g>
  </g>
</svg>
